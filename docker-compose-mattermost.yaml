version: "3"

services:
  db:
    image: postgres:15-alpine  # 14버전 이상의 최신 스테이블 버전
    platform: linux/amd64      # Mac M1/M2 사용 시 필수
    restart: unless-stopped
    volumes:
      - ./postgres_data_v15:/var/lib/postgresql/data # 새로운 경로로 지정
    environment:
      - POSTGRES_USER=mmuser
      - POSTGRES_PASSWORD=mostest
      - POSTGRES_DB=mattermost

  mattermost:
    image: mattermost/mattermost-team-edition:latest
    platform: linux/amd64
    depends_on:
      - db
    ports:
      - "8065:8065"
    restart: unless-stopped
    environment:
      - MM_SQLSETTINGS_DRIVERNAME=postgres
      - MM_SQLSETTINGS_DATASOURCE=postgres://mmuser:mostest@db:5432/mattermost?sslmode=disable&connect_timeout=10
